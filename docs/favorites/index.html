<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRHEA-Light | Favorites</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/irhea-light-demo/css/app.css">

</head>
<body>
  <div class="app-shell">
    <header class="topbar">
  <div class="topbar-brand">
    <div class="logo-icon">iR</div>
    <span class="logo-text">iRHEA-Light</span>
  </div>
  <h1 class="topbar-title">Favorites</h1>
  <div class="topbar-spacer"></div>
  <div class="topbar-status">
    <span class="status-dot"></span>
    <span>Connected</span>
  </div>
  <div class="topbar-clock" id="topbar-clock"></div>
</header>

    <main class="content-area">
      <div class="page-content">
        <!-- Favorites Page -->
<div class="page-content">
  <div class="section-header mb-20">
    <div>
      <h2 class="section-title">Favorites</h2>
      <p class="section-subtitle">Quick access recipes per spout</p>
    </div>
  </div>

  <!-- Spout Tabs -->
  <div class="tabs" id="fav-tabs">
    <button class="tab-item active" data-spout="1">Spout 1</button>
    <button class="tab-item" data-spout="2">Spout 2</button>
    <button class="tab-item" data-spout="3">Spout 3</button>
    <button class="tab-item" data-spout="4">Spout 4</button>
    <button class="tab-item" data-spout="5">Spout 5</button>
  </div>

  <!-- Favorite Cards -->
  <div class="grid-3" id="fav-grid"></div>
</div>

      </div>
    </main>
    <nav class="bottom-nav" id="bottom-nav">
  <a href="/irhea-light-demo/" class="bnav-item ">
    <span class="bnav-icon">&#9632;</span>
    <span class="bnav-label">Control</span>
  </a>
  <a href="/irhea-light-demo/recipes" class="bnav-item ">
    <span class="bnav-icon">&#9749;</span>
    <span class="bnav-label">Recipes</span>
  </a>
  <a href="/irhea-light-demo/brewing" class="bnav-item ">
    <span class="bnav-icon">&#9200;</span>
    <span class="bnav-label">Brewing</span>
  </a>
  <a href="/irhea-light-demo/favorites" class="bnav-item active">
    <span class="bnav-icon">&#9733;</span>
    <span class="bnav-label">Favorites</span>
  </a>
  <button class="bnav-item " onclick="toggleMoreMenu()">
    <span class="bnav-icon">&#8943;</span>
    <span class="bnav-label">More</span>
  </button>
</nav>

  </div>

  <!-- More Menu Overlay -->
  <div class="more-overlay" id="more-overlay" onclick="closeMoreMenu()"></div>
  <div class="more-menu" id="more-menu">
    <div class="more-menu-header">
      <span>System</span>
      <button class="more-menu-close" onclick="closeMoreMenu()">&times;</button>
    </div>
    <a href="/irhea-light-demo/alarms" class="more-menu-item ">
      <span class="more-icon">&#9888;</span>
      <span>Alarms</span>
      <span class="nav-badge" id="alarm-badge-more">3</span>
    </a>
    <a href="/irhea-light-demo/usage" class="more-menu-item ">
      <span class="more-icon">&#9636;</span>
      <span>Usage History</span>
    </a>
    <a href="/irhea-light-demo/settings" class="more-menu-item ">
      <span class="more-icon">&#9881;</span>
      <span>Settings</span>
    </a>
    <a href="/irhea-light-demo/calibration" class="more-menu-item ">
      <span class="more-icon">&#8982;</span>
      <span>Calibration</span>
    </a>
    <a href="/irhea-light-demo/firmware" class="more-menu-item ">
      <span class="more-icon">&#8635;</span>
      <span>Firmware</span>
    </a>
    <a href="/irhea-light-demo/system-info" class="more-menu-item ">
      <span class="more-icon">&#9432;</span>
      <span>System Info</span>
    </a>
  </div>

  <div class="toast-container" id="toast-container"></div>


  <script>window.BASE_PATH = "/irhea-light-demo";</script>
  <!-- Global JS -->
  <script src="/irhea-light-demo/js/app.js"></script>

  <!-- Component JS -->
  <script src="/irhea-light-demo/js/components/gauge.js"></script>
  <script src="/irhea-light-demo/js/components/progress-ring.js"></script>
  <script src="/irhea-light-demo/js/components/timeline.js"></script>

  <!-- Page JS -->
  
  
  
  
  
  
  <script src="/irhea-light-demo/js/pages/favorites.js"></script>
  
  
  
  
  
  
</body>
</html>
