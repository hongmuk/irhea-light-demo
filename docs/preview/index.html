<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>iRHEA-Light — Hand-Drip Cinema</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap"
  rel="stylesheet"
/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cream:        '#F5EDE0',
          paper:        '#FCFAF4',
          sand:         '#EBE2D1',
          walnut:       '#2C2317',
          'walnut-mid': '#4A3A26',
          bark:         '#6A5B48',
          brass:        '#C5A059',
          'brass-light':'#E0C896',
          'brass-aged': '#8B6F3D',
          ok:           '#5C7C5C',
          warning:      '#A8841A',
          error:        '#8B2A1F',
          info:         '#1B3A4B',
        },
        fontFamily: {
          serif: ['Georgia', 'ui-serif', 'serif'],
          sans:  ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono:  ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>
<style>
  :root {
    --hairline: rgba(60, 40, 20, 0.14);
    --hairline-strong: rgba(60, 40, 20, 0.28);
  }
  html, body { margin: 0; padding: 0; background: #1a1610; height: 100%; overflow: hidden; }
  body { font-family: Inter, system-ui, sans-serif; color: #2C2317; }
  .stage {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: #1a1610;
  }
  .canvas {
    width: 1280px; height: 800px;
    background: #F5EDE0;
    transform-origin: center center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    position: relative;
    overflow: hidden;
  }
  .hairline { background: var(--hairline); }
  .border-hairline { border-color: var(--hairline) !important; }
  .tabular { font-variant-numeric: tabular-nums; }
  .mono-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-weight: 400;
  }
  .pretty { text-wrap: pretty; }
  .balance { text-wrap: balance; }
  /* Photo placeholder grain — subtle hairline cross-hatch when no image loads */
  .photo-fallback {
    background-image:
      repeating-linear-gradient(45deg, rgba(60,40,20,0.05) 0 1px, transparent 1px 6px),
      repeating-linear-gradient(-45deg, rgba(60,40,20,0.05) 0 1px, transparent 1px 6px);
    background-color: #EBE2D1;
  }
  /* nav */
  .nav-tick { transition: all 220ms ease; }
  /* Hand-drip stage animations */
  @keyframes streamFlow { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -10; } }
  /* Kettle and stream orbit on a circle at constant angular speed (linear timing). */
  @keyframes orbitDistance { from { offset-distance: 0%; } to { offset-distance: 100%; } }
  @keyframes drawSpiral {
    0%   { stroke-dashoffset: 320; opacity: 0.85; }
    78%  { stroke-dashoffset: 0;   opacity: 0.85; }
    100% { stroke-dashoffset: 0;   opacity: 0.25; }
  }
  @keyframes pourSpiral {
    0%   { offset-distance: 0%;  }
    100% { offset-distance: 100%; }
  }
  @keyframes bedSwirl     { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -18; } }
  @keyframes bedRotate    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes streamWaver { 0%,100% { transform: translateX(0); } 50% { transform: translateX(0.6px); } }
  @keyframes dripFall {
    0%   { transform: translate(0, -10px) scaleY(0.5); opacity: 0; }
    15%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translate(0, 22px) scaleY(1.4); opacity: 0; }
  }
  /* bloomPulse kept for back-compat but now a no-op. The bed already has
     bedRy=8 (vs 5) during bloom, plus bloom bubbles and the BLOOMING caption,
     which conveys the swell without distracting up/down jitter. */
  @keyframes bloomPulse {
    from, to { transform: none; }
  }
  @keyframes bedShimmer {
    0%,100% { opacity: 0.55; }
    50%     { opacity: 0.85; }
  }
  @keyframes steam {
    0%   { transform: translate(0, 0)   scale(1);   opacity: 0; }
    20%  { opacity: 0.55; }
    100% { transform: translate(-6px, -32px) scale(1.6); opacity: 0; }
  }
  @keyframes ripple {
    0%   { transform: scale(0.2); opacity: 0.8; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes spiralSweep {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .hd-stream  { animation: streamFlow 0.5s linear infinite; }
  /* Orbit removed — kettle was orbiting while stream stayed fixed, breaking
     spout-to-stream alignment. The plan-view medallion's spiral animation
     still conveys the rotating-pour pattern. The kettle's gooseneck is
     statically posed to deliver water onto the spine. */
  .hd-stream-wrap { /* no orbit */ }
  .hd-kettle      { /* no orbit */ }
  .hd-spiral-path { stroke-dasharray: 320; animation: drawSpiral 7.2s linear infinite; }
  .hd-pour-dot    { animation: pourSpiral 7.2s linear infinite; }
  .hd-bed-ring    { animation: bedSwirl 1.4s linear infinite; }
  .hd-bed-rotor   { animation: bedRotate 2.4s linear infinite; transform-origin: 200px 222px; transform-box: view-box; }
  .hd-drip    { animation: dripFall 1.05s ease-in infinite; transform-origin: center; }
  .hd-drip-2  { animation: dripFall 1.05s ease-in infinite; animation-delay: 0.55s; }
  .hd-bloom   { animation: bloomPulse 2.4s ease-in-out infinite; transform-origin: center 226px; transform-box: fill-box; }
  .hd-shimmer { animation: bedShimmer 2.6s ease-in-out infinite; }
  .hd-steam   { animation: steam 2.2s ease-out infinite; }
  .hd-steam-2 { animation: steam 2.2s ease-out infinite; animation-delay: 0.7s; }
  .hd-steam-3 { animation: steam 2.2s ease-out infinite; animation-delay: 1.4s; }
  .hd-ripple  { animation: ripple 1.05s ease-out infinite; transform-origin: center; transform-box: fill-box; }
  .hd-spiral  { animation: spiralSweep 2.4s linear infinite; transform-origin: 200px 226px; transform-box: view-box; }
  .hd-paused .hd-stream,
  .hd-paused .hd-drip,
  .hd-paused .hd-drip-2,
  .hd-paused .hd-stream-wrap,
  .hd-paused .hd-kettle,
  .hd-paused .hd-spiral-path,
  .hd-paused .hd-pour-dot,
  .hd-paused .hd-bed-ring,
  .hd-paused .hd-bed-rotor,
  .hd-paused .hd-steam,
  .hd-paused .hd-steam-2,
  .hd-paused .hd-steam-3 { animation-play-state: paused; }

  /* hide spinners */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="canvas" id="canvas">
    <div id="root" style="width:100%;height:100%"></div>
  </div>
</div>

<script>
  // Fit-to-viewport scale for the 1280×800 canvas.
  function fit() {
    const c = document.getElementById('canvas');
    const w = window.innerWidth, h = window.innerHeight;
    const s = Math.min(w / 1280, h / 800);
    c.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  fit();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

</body>
</html>
