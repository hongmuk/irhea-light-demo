<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRHEA-Light | Alarms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/app.css">

</head>
<body>
  <div class="app-shell">
    <header class="topbar">
  <div class="topbar-brand">
    <div class="logo-icon">iR</div>
    <span class="logo-text">iRHEA-Light</span>
  </div>
  <h1 class="topbar-title">Alarms</h1>
  <div class="topbar-spacer"></div>
  <div class="topbar-status">
    <span class="status-dot"></span>
    <span>Connected</span>
  </div>
  <div class="topbar-clock" id="topbar-clock"></div>
</header>

    <main class="content-area">
      <div class="page-content">
        <!-- Alarms Page -->
<div class="page-content">
  <div class="section-header mb-20">
    <div>
      <h2 class="section-title">Alarms</h2>
      <p class="section-subtitle">Active alarms and alarm history</p>
    </div>
  </div>

  <!-- Filter -->
  <div class="flex items-center gap-16 mb-20">
    <div class="filter-pills" id="alarm-filters">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="MCP">MCP</button>
      <button class="filter-pill" data-filter="MDP">MDP</button>
      <button class="filter-pill" data-filter="WHP">WHP</button>
    </div>
  </div>

  <!-- Active Alarms -->
  <div class="glass-card glass-card-lg mb-24">
    <div class="section-header mb-16">
      <h3 class="section-title" style="font-size:16px;">Active Alarms</h3>
      <span class="alarm-badge mcp" id="active-count">3</span>
    </div>
    <div id="active-alarms-list"></div>
  </div>

  <!-- Alarm History -->
  <div class="glass-card glass-card-lg">
    <div class="section-header mb-16">
      <h3 class="section-title" style="font-size:16px;">Alarm History</h3>
    </div>
    <div id="alarm-history-list"></div>
  </div>
</div>

      </div>
    </main>
    <nav class="bottom-nav" id="bottom-nav">
  <a href="/" class="bnav-item ">
    <span class="bnav-icon">&#9632;</span>
    <span class="bnav-label">Control</span>
  </a>
  <a href="/recipes" class="bnav-item ">
    <span class="bnav-icon">&#9749;</span>
    <span class="bnav-label">Recipes</span>
  </a>
  <a href="/brewing" class="bnav-item ">
    <span class="bnav-icon">&#9200;</span>
    <span class="bnav-label">Brewing</span>
  </a>
  <a href="/favorites" class="bnav-item ">
    <span class="bnav-icon">&#9733;</span>
    <span class="bnav-label">Favorites</span>
  </a>
  <button class="bnav-item active" onclick="toggleMoreMenu()">
    <span class="bnav-icon">&#8943;</span>
    <span class="bnav-label">More</span>
  </button>
</nav>

  </div>

  <!-- More Menu Overlay -->
  <div class="more-overlay" id="more-overlay" onclick="closeMoreMenu()"></div>
  <div class="more-menu" id="more-menu">
    <div class="more-menu-header">
      <span>System</span>
      <button class="more-menu-close" onclick="closeMoreMenu()">&times;</button>
    </div>
    <a href="/alarms" class="more-menu-item active">
      <span class="more-icon">&#9888;</span>
      <span>Alarms</span>
      <span class="nav-badge" id="alarm-badge-more">3</span>
    </a>
    <a href="/usage" class="more-menu-item ">
      <span class="more-icon">&#9636;</span>
      <span>Usage History</span>
    </a>
    <a href="/settings" class="more-menu-item ">
      <span class="more-icon">&#9881;</span>
      <span>Settings</span>
    </a>
    <a href="/calibration" class="more-menu-item ">
      <span class="more-icon">&#8982;</span>
      <span>Calibration</span>
    </a>
    <a href="/firmware" class="more-menu-item ">
      <span class="more-icon">&#8635;</span>
      <span>Firmware</span>
    </a>
    <a href="/system-info" class="more-menu-item ">
      <span class="more-icon">&#9432;</span>
      <span>System Info</span>
    </a>
  </div>

  <div class="toast-container" id="toast-container"></div>


  <script>window.BASE_PATH = "";</script>
  <!-- Global JS -->
  <script src="/js/app.js"></script>

  <!-- Component JS -->
  <script src="/js/components/gauge.js"></script>
  <script src="/js/components/progress-ring.js"></script>
  <script src="/js/components/timeline.js"></script>

  <!-- Page JS -->
  
  
  
  
  
  
  
  <script src="/js/pages/alarms.js"></script>
  
  
  
  
  
</body>
</html>
