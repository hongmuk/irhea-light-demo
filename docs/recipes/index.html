<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRHEA-Light | Recipes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/irhea-light-demo/css/app.css">

</head>
<body>
  <div class="app-shell">
    <header class="topbar">
  <div class="topbar-brand">
    <div class="logo-icon">iR</div>
    <span class="logo-text">iRHEA-Light</span>
  </div>
  <h1 class="topbar-title">Recipes</h1>
  <div class="topbar-spacer"></div>
  <div class="topbar-status">
    <span class="status-dot"></span>
    <span>Connected</span>
  </div>
  <div class="topbar-clock" id="topbar-clock"></div>
</header>

    <main class="content-area">
      <div class="page-content">
        <!-- Recipe List Page -->
<div class="page-content">
  <div class="section-header mb-20">
    <div>
      <h2 class="section-title">Recipes</h2>
      <p class="section-subtitle">Manage your pour-over recipes</p>
    </div>
  </div>

  <!-- Filters -->
  <div class="flex items-center gap-16 mb-20" style="flex-wrap:wrap;">
    <div class="search-bar">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="recipe-search" placeholder="Search recipes..." />
    </div>
    <div class="filter-pills" id="dripper-filters">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="Hario">Hario</button>
      <button class="filter-pill" data-filter="Kalita">Kalita</button>
      <button class="filter-pill" data-filter="Kalita Wave">Kalita Wave</button>
      <button class="filter-pill" data-filter="Kono">Kono</button>
      <button class="filter-pill" data-filter="Chemax">Chemax</button>
      <button class="filter-pill" data-filter="December">December</button>
      <button class="filter-pill" data-filter="Melita">Melita</button>
    </div>
    <div style="margin-left:auto;">
      <select class="form-input" id="recipe-sort" style="width:auto;min-height:40px;padding:8px 40px 8px 12px;">
        <option value="name">Sort by Name</option>
        <option value="recent">Sort by Recent</option>
        <option value="water">Sort by Water</option>
      </select>
    </div>
  </div>

  <!-- Recipe Grid -->
  <div class="grid-3" id="recipe-grid"></div>
</div>

      </div>
    </main>
    <nav class="bottom-nav" id="bottom-nav">
  <a href="/irhea-light-demo/" class="bnav-item ">
    <span class="bnav-icon">&#9632;</span>
    <span class="bnav-label">Control</span>
  </a>
  <a href="/irhea-light-demo/recipes" class="bnav-item active">
    <span class="bnav-icon">&#9749;</span>
    <span class="bnav-label">Recipes</span>
  </a>
  <a href="/irhea-light-demo/brewing" class="bnav-item ">
    <span class="bnav-icon">&#9200;</span>
    <span class="bnav-label">Brewing</span>
  </a>
  <a href="/irhea-light-demo/favorites" class="bnav-item ">
    <span class="bnav-icon">&#9733;</span>
    <span class="bnav-label">Favorites</span>
  </a>
  <button class="bnav-item " onclick="toggleMoreMenu()">
    <span class="bnav-icon">&#8943;</span>
    <span class="bnav-label">More</span>
  </button>
</nav>

  </div>

  <!-- More Menu Overlay -->
  <div class="more-overlay" id="more-overlay" onclick="closeMoreMenu()"></div>
  <div class="more-menu" id="more-menu">
    <div class="more-menu-header">
      <span>System</span>
      <button class="more-menu-close" onclick="closeMoreMenu()">&times;</button>
    </div>
    <a href="/irhea-light-demo/alarms" class="more-menu-item ">
      <span class="more-icon">&#9888;</span>
      <span>Alarms</span>
      <span class="nav-badge" id="alarm-badge-more">3</span>
    </a>
    <a href="/irhea-light-demo/usage" class="more-menu-item ">
      <span class="more-icon">&#9636;</span>
      <span>Usage History</span>
    </a>
    <a href="/irhea-light-demo/settings" class="more-menu-item ">
      <span class="more-icon">&#9881;</span>
      <span>Settings</span>
    </a>
    <a href="/irhea-light-demo/calibration" class="more-menu-item ">
      <span class="more-icon">&#8982;</span>
      <span>Calibration</span>
    </a>
    <a href="/irhea-light-demo/firmware" class="more-menu-item ">
      <span class="more-icon">&#8635;</span>
      <span>Firmware</span>
    </a>
    <a href="/irhea-light-demo/system-info" class="more-menu-item ">
      <span class="more-icon">&#9432;</span>
      <span>System Info</span>
    </a>
  </div>

  <div class="toast-container" id="toast-container"></div>


  <script>window.BASE_PATH = "/irhea-light-demo";</script>
  <!-- Global JS -->
  <script src="/irhea-light-demo/js/app.js"></script>

  <!-- Component JS -->
  <script src="/irhea-light-demo/js/components/gauge.js"></script>
  <script src="/irhea-light-demo/js/components/progress-ring.js"></script>
  <script src="/irhea-light-demo/js/components/timeline.js"></script>

  <!-- Page JS -->
  
  <script src="/irhea-light-demo/js/pages/recipe-list.js"></script>
  
  
  
  
  
  
  
  
  
  
  
</body>
</html>
