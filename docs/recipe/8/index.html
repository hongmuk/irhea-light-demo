<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRHEA-Light | Recipe Detail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/irhea-light-demo/css/app.css">

</head>
<body>
  <div class="app-shell">
    <header class="topbar">
  <div class="topbar-brand">
    <div class="logo-icon">iR</div>
    <span class="logo-text">iRHEA-Light</span>
  </div>
  <h1 class="topbar-title">Recipe Detail</h1>
  <div class="topbar-spacer"></div>
  <div class="topbar-status">
    <span class="status-dot"></span>
    <span>Connected</span>
  </div>
  <div class="topbar-clock" id="topbar-clock"></div>
</header>

    <main class="content-area">
      <div class="page-content">
        <!-- Recipe Detail Page -->
<div class="page-content">
  <div class="flex items-center gap-16 mb-24">
    <a href="/irhea-light-demo/recipes" class="btn btn-ghost btn-icon">&#8592;</a>
    <div style="flex:1;">
      <h2 class="section-title" id="recipe-name">Loading...</h2>
      <p class="section-subtitle" id="recipe-dripper"></p>
    </div>
    <button class="btn btn-ghost btn-icon" id="fav-toggle" title="Toggle Favorite">&#9734;</button>
    <a class="btn btn-secondary" id="edit-link" href="#">&#9998; Edit</a>
    <button class="btn btn-primary" id="brew-btn">&#9654; Brew</button>
  </div>

  <div class="grid-2 mb-24">
    <!-- Parameters -->
    <div class="glass-card glass-card-lg">
      <h3 style="font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:16px;">Parameters</h3>
      <div class="info-grid" id="recipe-params"></div>
    </div>

    <!-- Stage Timeline -->
    <div class="glass-card glass-card-lg">
      <h3 style="font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:16px;">Extraction Stages</h3>
      <div id="stage-timeline" style="margin-bottom:16px;"></div>
      <div id="stage-bars"></div>
    </div>
  </div>

  <!-- Notes -->
  <div class="glass-card glass-card-lg mb-24">
    <h3 style="font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:12px;">Notes</h3>
    <p id="recipe-notes" style="color:var(--text-secondary);line-height:1.6;font-size:14px;"></p>
  </div>

  <!-- Stage Details Table -->
  <div class="glass-card glass-card-lg">
    <h3 style="font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:16px;">Stage Details</h3>
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Type</th>
          <th>Label</th>
          <th>Time</th>
          <th>Water</th>
          <th>Spiral</th>
        </tr>
      </thead>
      <tbody id="stage-table"></tbody>
    </table>
  </div>
</div>

      </div>
    </main>
    <nav class="bottom-nav" id="bottom-nav">
  <a href="/irhea-light-demo/" class="bnav-item ">
    <span class="bnav-icon">&#9632;</span>
    <span class="bnav-label">Control</span>
  </a>
  <a href="/irhea-light-demo/recipes" class="bnav-item active">
    <span class="bnav-icon">&#9749;</span>
    <span class="bnav-label">Recipes</span>
  </a>
  <a href="/irhea-light-demo/brewing" class="bnav-item ">
    <span class="bnav-icon">&#9200;</span>
    <span class="bnav-label">Brewing</span>
  </a>
  <a href="/irhea-light-demo/favorites" class="bnav-item ">
    <span class="bnav-icon">&#9733;</span>
    <span class="bnav-label">Favorites</span>
  </a>
  <button class="bnav-item " onclick="toggleMoreMenu()">
    <span class="bnav-icon">&#8943;</span>
    <span class="bnav-label">More</span>
  </button>
</nav>

  </div>

  <!-- More Menu Overlay -->
  <div class="more-overlay" id="more-overlay" onclick="closeMoreMenu()"></div>
  <div class="more-menu" id="more-menu">
    <div class="more-menu-header">
      <span>System</span>
      <button class="more-menu-close" onclick="closeMoreMenu()">&times;</button>
    </div>
    <a href="/irhea-light-demo/alarms" class="more-menu-item ">
      <span class="more-icon">&#9888;</span>
      <span>Alarms</span>
      <span class="nav-badge" id="alarm-badge-more">3</span>
    </a>
    <a href="/irhea-light-demo/usage" class="more-menu-item ">
      <span class="more-icon">&#9636;</span>
      <span>Usage History</span>
    </a>
    <a href="/irhea-light-demo/settings" class="more-menu-item ">
      <span class="more-icon">&#9881;</span>
      <span>Settings</span>
    </a>
    <a href="/irhea-light-demo/calibration" class="more-menu-item ">
      <span class="more-icon">&#8982;</span>
      <span>Calibration</span>
    </a>
    <a href="/irhea-light-demo/firmware" class="more-menu-item ">
      <span class="more-icon">&#8635;</span>
      <span>Firmware</span>
    </a>
    <a href="/irhea-light-demo/system-info" class="more-menu-item ">
      <span class="more-icon">&#9432;</span>
      <span>System Info</span>
    </a>
  </div>

  <div class="toast-container" id="toast-container"></div>


  <script>window.BASE_PATH = "/irhea-light-demo";</script>
  <!-- Global JS -->
  <script src="/irhea-light-demo/js/app.js"></script>

  <!-- Component JS -->
  <script src="/irhea-light-demo/js/components/gauge.js"></script>
  <script src="/irhea-light-demo/js/components/progress-ring.js"></script>
  <script src="/irhea-light-demo/js/components/timeline.js"></script>

  <!-- Page JS -->
  
  
  <script src="/irhea-light-demo/js/pages/recipe-detail.js"></script>
  
  
  
  
  
  
  
  
  
  
</body>
</html>
